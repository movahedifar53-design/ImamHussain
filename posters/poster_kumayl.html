<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body {
    font-family:'Plus Jakarta Sans',sans-serif;
    background:
      radial-gradient(680px 520px at 50% 8%, rgba(160,18,26,0.55), transparent 60%),
      radial-gradient(900px 700px at 50% 108%, rgba(120,12,18,0.30), transparent 60%),
      #08080A;
    color:#F5F2EC; width:1080px; height:1350px; position:relative; overflow:hidden;
  }
  /* ornamental frame */
  .frame { position:absolute; inset:34px; border:1.5px solid rgba(230,57,70,0.34); border-radius:10px; }
  .frame::before { content:""; position:absolute; inset:10px; border:1px solid rgba(242,148,155,0.16); border-radius:6px; }
  .corner { position:absolute; width:46px; height:46px; border:2px solid #E63946; }
  .c-tl{ top:22px; left:22px; border-right:0; border-bottom:0; }
  .c-tr{ top:22px; right:22px; border-left:0; border-bottom:0; }
  .c-bl{ bottom:22px; left:22px; border-right:0; border-top:0; }
  .c-br{ bottom:22px; right:22px; border-left:0; border-top:0; }

  .wrap { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
          text-align:center; padding:108px 90px 96px; }

  .eyebrow { font-size:22px; font-weight:600; letter-spacing:.42em; text-transform:uppercase;
             color:#E8909A; }

  .dome { width:150px; height:150px; margin:30px 0 8px; }

  .ar { font-family:'Amiri',serif; direction:rtl; font-weight:700; font-size:96px; line-height:1.1;
        color:#F2949B; margin-top:6px; }
  .title { font-family:'Cormorant Garamond',serif; font-weight:700; font-size:138px; line-height:0.98;
           letter-spacing:1px; margin-top:6px; }
  .title b { color:#E63946; }
  .subtitle { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500; font-size:34px;
              color:#C8C2B8; margin-top:18px; max-width:720px; line-height:1.4; }

  .orn { display:flex; align-items:center; gap:18px; margin:42px 0 36px; color:#E63946; }
  .orn .ln { width:120px; height:1px; background:linear-gradient(90deg,transparent,#E63946); }
  .orn .ln.r { background:linear-gradient(270deg,transparent,#E63946); }
  .orn .dia { width:12px; height:12px; background:#E63946; transform:rotate(45deg);
              box-shadow:0 0 16px rgba(230,57,70,.7); }

  .when-day { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px;
              letter-spacing:.34em; text-transform:uppercase; color:#A8A29B; }
  .when-date { font-family:'Cormorant Garamond',serif; font-weight:700; font-size:96px; line-height:1.04;
               margin-top:4px; }
  .when-time { display:inline-block; margin-top:22px; padding:12px 34px; border:1.5px solid #E63946;
               border-radius:999px; font-size:38px; font-weight:700; letter-spacing:.06em;
               color:#F5F2EC; background:rgba(230,57,70,0.10); }

  .spacer { flex:1; }

  .venue-label { font-size:19px; font-weight:600; letter-spacing:.34em; text-transform:uppercase;
                 color:#7C7770; }
  .venue { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:46px; margin-top:8px;
           color:#F5F2EC; }
  .welcome { margin-top:26px; font-size:24px; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
             color:#E8909A; }
</style></head>
<body>
  <div class="frame"></div>
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div class="wrap">
    <div class="eyebrow">Imam Hussain Community Centre</div>

    <svg class="dome" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="d" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F05060"/><stop offset="55%" stop-color="#E63946"/><stop offset="100%" stop-color="#9E0E18"/>
        </linearGradient>
        <linearGradient id="fl" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#F05060"/><stop offset="100%" stop-color="#C01624"/>
        </linearGradient>
      </defs>
      <g fill="#E63946" fill-opacity="0.9">
        <rect x="166" y="232" width="13" height="96" rx="3"/><ellipse cx="172.5" cy="228" rx="11" ry="15"/><circle cx="172.5" cy="208" r="4"/>
        <rect x="333" y="232" width="13" height="96" rx="3"/><ellipse cx="339.5" cy="228" rx="11" ry="15"/><circle cx="339.5" cy="208" r="4"/>
      </g>
      <path d="M196 318 C 184 268 198 226 226 200 C 246 182 250 168 256 150 C 262 168 266 182 286 200 C 314 226 328 268 316 318 Z" fill="url(#d)" stroke="#FCE9EC" stroke-opacity="0.18" stroke-width="2"/>
      <rect x="252.5" y="112" width="7" height="42" rx="3" fill="#F2949B"/><circle cx="256" cy="106" r="9" fill="#F2949B"/>
      <path d="M256 70 L256 106" stroke="#F2949B" stroke-width="5" stroke-linecap="round"/>
      <path d="M258 72 C 290 76 300 92 332 88 L 332 122 C 300 126 290 110 258 116 Z" fill="url(#fl)"/>
      <rect x="190" y="318" width="132" height="16" rx="5" fill="#C01624"/>
      <rect x="172" y="334" width="168" height="14" rx="4" fill="#E63946" fill-opacity="0.85"/>
    </svg>

    <div class="ar">دُعَاء كُمَيْل</div>
    <div class="title">Dua <b>Kumayl</b></div>
    <div class="subtitle">The supplication of Imam Ali (a), recited on the eve of Friday</div>

    <div class="orn"><span class="ln"></span><span class="dia"></span><span class="ln r"></span></div>

    <div class="when-day">Thursday</div>
    <div class="when-date">2 July 2026</div>
    <div class="when-time">7:30 PM</div>

    <div class="spacer"></div>

    <div class="venue-label">Join us at</div>
    <div class="venue">Imam Hussain Community Centre</div>
    <div class="welcome">All are welcome</div>
  </div>
</body></html>
