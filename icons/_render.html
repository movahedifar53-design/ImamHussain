<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:0}svg{display:block;width:100vw;height:100vh}
</style></head><body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#3A0B11"/>
      <stop offset="52%" stop-color="#120D10"/>
      <stop offset="100%" stop-color="#08080A"/>
    </radialGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F05060"/>
      <stop offset="55%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#9E0E18"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F05060"/>
      <stop offset="100%" stop-color="#C01624"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- pointed-arch medallion frame -->
  <path d="M256 96
           C 350 96 392 168 392 252
           C 392 340 332 392 256 392
           C 180 392 120 340 120 252
           C 120 168 162 96 256 96 Z"
        fill="none" stroke="#E63946" stroke-opacity="0.28" stroke-width="6"/>
  <path d="M256 110
           C 338 110 378 174 378 252
           C 378 332 324 378 256 378
           C 188 378 134 332 134 252
           C 134 174 174 110 256 110 Z"
        fill="none" stroke="#F2949B" stroke-opacity="0.16" stroke-width="2"/>

  <!-- twin minarets -->
  <g fill="#E63946" fill-opacity="0.9">
    <rect x="166" y="232" width="13" height="96" rx="3"/>
    <ellipse cx="172.5" cy="228" rx="11" ry="15"/>
    <circle cx="172.5" cy="208" r="4"/>
    <rect x="333" y="232" width="13" height="96" rx="3"/>
    <ellipse cx="339.5" cy="228" rx="11" ry="15"/>
    <circle cx="339.5" cy="208" r="4"/>
  </g>

  <!-- main onion dome -->
  <path d="M196 318
           C 184 268 198 226 226 200
           C 246 182 250 168 256 150
           C 262 168 266 182 286 200
           C 314 226 328 268 316 318 Z"
        fill="url(#dome)" stroke="#FCE9EC" stroke-opacity="0.18" stroke-width="2"/>

  <!-- finial spire + ball -->
  <rect x="252.5" y="112" width="7" height="42" rx="3" fill="#F2949B"/>
  <circle cx="256" cy="106" r="9" fill="#F2949B"/>

  <!-- red flag of Karbala -->
  <path d="M256 70 L256 106" stroke="#F2949B" stroke-width="5" stroke-linecap="round"/>
  <path d="M258 72 C 290 76 300 92 332 88 L 332 122 C 300 126 290 110 258 116 Z" fill="url(#flag)"/>

  <!-- base band + platform -->
  <rect x="190" y="318" width="132" height="16" rx="5" fill="#C01624"/>
  <rect x="172" y="334" width="168" height="14" rx="4" fill="#E63946" fill-opacity="0.85"/>
</svg>
</body></html>
